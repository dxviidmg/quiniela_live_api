services:
  - type: web
    name: quiniela-live-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn quiniela_live_api.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiniela-live-db
          property: connectionString

databases:
  - name: quiniela-live-db
    plan: basic-256mb
