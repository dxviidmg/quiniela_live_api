services:
  - type: web
    name: quiniela-live-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT quiniela_live_api.asgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiniela-live-db
          property: connectionString

databases:
  - name: quiniela-live-db
    plan: basic-256mb
